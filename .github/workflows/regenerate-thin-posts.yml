name: Regenerate Thin Posts

on:
  # Twice daily — clears the 38-post backlog in under 3 weeks
  schedule:
    - cron: '0  7 * * *'   # 7:00 UTC  = ~8am BST
    - cron: '0 14 * * *'   # 14:00 UTC = ~3pm BST

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show which post would be regenerated without doing it'
        type: boolean
        required: false
        default: false

jobs:
  regenerate:
    name: Regenerate thinnest post
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Regenerate thinnest post
        working-directory: scripts/content-engine
        env:
          GH_TOKEN:          ${{ secrets.GH_PAT }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          GITHUB_OWNER:      farrimond-ma
          GITHUB_REPO:       boxxfinance-site
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node regenerate-thin-posts.js --dry-run
          else
            node regenerate-thin-posts.js
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Thin Post Regenerator" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Regenerates the thinnest published blog post each run until all 38 are fixed." >> $GITHUB_STEP_SUMMARY
