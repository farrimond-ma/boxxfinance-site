name: Publish LinkedIn Post

on:
  # Trigger after either blog publisher (AM or PM) completes successfully
  workflow_run:
    workflows: ["Publish Blog", "Publish Blog PM"]
    types:
      - completed

  # Also run on a schedule as a safety net (8:00 AM UTC = 9:00 AM BST)
  schedule:
    - cron: '0 8 * * *'

  # Manual trigger
  workflow_dispatch:

jobs:
  publish-linkedin:
    name: Generate and post to LinkedIn
    runs-on: ubuntu-latest
    # Only run if the blog publish succeeded (or if triggered manually/scheduled)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Run LinkedIn publisher
        working-directory: scripts/content-engine
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:                    ${{ secrets.GH_PAT }}
          GITHUB_OWNER:                farrimond-ma
          GITHUB_REPO:                 boxxfinance-site
          SERVICE_FILTER:             Bridging Finance
          LINKEDIN_ACCESS_TOKEN_MARK:  ${{ secrets.LINKEDIN_ACCESS_TOKEN_MARK }}
          LINKEDIN_ACCESS_TOKEN_ANDREW: ${{ secrets.LINKEDIN_ACCESS_TOKEN_ANDREW }}
          LINKEDIN_ORG_ID:             ${{ secrets.LINKEDIN_ORG_ID }}
          LINKEDIN_ORG_ACCESS_TOKEN:   ${{ secrets.LINKEDIN_ORG_ACCESS_TOKEN }}
        run: node publish-linkedin.js

      - name: Post summary
        if: always()
        run: |
          echo "## LinkedIn Publisher" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Reads directly from blogPosts.json â€” no LinkedIn Queue needed" >> $GITHUB_STEP_SUMMARY
