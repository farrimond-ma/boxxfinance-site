name: Seed Content Engine

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (true = preview, false = write to sheet)'
        required: false
        default: 'true'

jobs:
  seed:
    name: Seed ContentEngine tab
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: scripts/content-engine

      - name: Run seeder
        working-directory: scripts/content-engine
        env:
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          DRY_RUN:            ${{ github.event.inputs.dry_run }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            node seed-content-engine.js --dry-run
          else
            node seed-content-engine.js
          fi
