name: Deploy Site

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check blogPosts.json content
        run: head -n 60 src/data/blogPosts.json

      - name: Build site
        env:
          CI: false
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run build:ci

      - name: Show built insights folder
        run: |
          echo "=== DIST ROOT ==="
          ls -la dist
          echo "=== DIST INSIGHTS ==="
          ls -la dist/insights || true
          echo "=== DIST TEST ARTICLE ==="
          ls -la dist/insights/test-article-for-github-publishing || true

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOSTNAME }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: boxxfinance.co.uk/public_html/
