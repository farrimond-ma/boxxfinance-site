name: Publish Facebook Post

on:
  # Trigger after either blog publisher completes — same pattern as LinkedIn.
  # GitHub cron schedules drift 2-3 hours on this repo; chaining to the blog
  # publishers means the FB post goes out minutes after the article does.
  workflow_run:
    workflows: ["Publish Blog (1 of 2)", "Publish Blog (2 of 2)"]
    types:
      - completed

  # Catch-up runs in case a chained trigger is missed or a post failed earlier
  schedule:
    - cron: '30 11 * * *'  # ~12:30 BST catch-up
    - cron: '42 14 * * *'  # ~3:42 BST catch-up

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  publish-facebook:
    name: Generate and post to Facebook
    runs-on: ubuntu-latest
    # Only chain off successful blog publishes; always allow cron/manual
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Run Facebook publisher
        working-directory: scripts/content-engine
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:                    ${{ secrets.GH_PAT }}
          GITHUB_OWNER:                farrimond-ma
          GITHUB_REPO:                 boxxfinance-site
          SERVICE_FILTER:             Bridging Finance
          FACEBOOK_PAGE_ID:            ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN:  ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: node publish-facebook.js

      - name: Post summary
        if: always()
        run: |
          echo "## Facebook Publisher" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "ðŸ“Š [View Queue](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
