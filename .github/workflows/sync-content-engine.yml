name: Add Visibility-Gap Content

on:
  # Runs every Sunday at 08:00 UTC — after the Monday visibility checker results
  # have had a week to settle. Reads AI_Visibility sheet, finds topics where
  # Boxx mention rate is below 34%, and adds PM-slot blog rows to ContentEngine.
  # Never overwrites existing rows — additive only.
  schedule:
    - cron: "0 8 * * 0"

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print what would be added without writing"
        type: boolean
        required: false
        default: false

jobs:
  add-visibility-content:
    name: Schedule visibility-gap PM blogs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: visibility-checker
        run: npm install

      - name: Add visibility-gap PM blog rows
        working-directory: visibility-checker
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/add-visibility-content.js --dry-run
          else
            node src/add-visibility-content.js
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Visibility Gap Content Scheduler" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**What it does:** Reads AI_Visibility sheet, finds topics where Boxx mention rate < 34%, adds PM-slot blog rows to ContentEngine for those gaps." >> $GITHUB_STEP_SUMMARY
          echo "📊 [View ContentEngine](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
