name: Add Visibility-Gap Content

on:
  # Triggers automatically after the AI Visibility Checker completes (Monday 7am UTC).
  # Reads the fresh results immediately and adds PM-slot blog rows for any gaps found.
  workflow_run:
    workflows: ["AI Visibility Check"]
    types:
      - completed

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print what would be added without writing"
        type: boolean
        required: false
        default: false

jobs:
  add-visibility-content:
    name: Schedule visibility-gap PM blogs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run if triggered manually, or if the checker succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: visibility-checker
        run: npm install

      - name: Add visibility-gap PM blog rows
        working-directory: visibility-checker
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node src/add-visibility-content.js --dry-run
          else
            node src/add-visibility-content.js
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Visibility Gap Content Scheduler" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**What it does:** Reads AI_Visibility sheet, finds topics where Boxx mention rate < 34%, adds PM-slot blog rows to ContentEngine for those gaps." >> $GITHUB_STEP_SUMMARY
          echo "📊 [View ContentEngine](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
