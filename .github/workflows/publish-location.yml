name: Publish Location

on:
  schedule:
    # 8:09 AM UTC = 9:09 AM UK time (BST). Runs every day. (staggered off :00 to dodge scheduler queueing)
    # Publishes ALL location pages due today or earlier in one run.
    - cron: '9 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: scripts/content-engine

      - name: Run location publisher
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_OWNER: farrimond-ma
          GITHUB_REPO: boxxfinance-site
          SERVICE_FILTER: Bridging Finance
        run: node publish-location.js
        working-directory: scripts/content-engine
        timeout-minutes: 30
