name: Publish Blog (1 of 2)
# Two parallel blog publishers run on staggered times to lift daily throughput —
# the "(1 of 2)" / "(2 of 2)" naming is NOT morning/afternoon. This one handles
# the AM slot in the ContentEngine sheet (publish-blog.js PUBLISH_SLOT default = AM).

on:
  schedule:
    # 6:37 AM UTC = 7:37 AM UK time (BST). Runs every day. (staggered off :30 to dodge scheduler queueing)
    - cron: '37 6 * * *'
    # Second AM-slot run added 2026-07-15 to drain the backlog faster (doubles AM throughput to ~2/day)
    - cron: '37 12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: scripts/content-engine

      - name: Run blog publisher
        env:
          GH_TOKEN:          ${{ secrets.GH_PAT }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SPREADSHEET_ID:    ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          GITHUB_OWNER:      farrimond-ma
          GITHUB_REPO:       boxxfinance-site
          SERVICE_FILTER:             Bridging Finance
        run: node publish-blog.js
        working-directory: scripts/content-engine
