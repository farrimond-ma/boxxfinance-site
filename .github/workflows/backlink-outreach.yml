name: Backlink Outreach Monitor

on:
  # Runs Friday at 9:18 UTC = 10:18 BST (staggered off :00 to dodge scheduler queueing)
  # End-of-week sweep: drafts are ready to review over the weekend and send Monday morning
  schedule:
    - cron: '18 9 * * 5'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — scan for articles without generating outreach'
        type: boolean
        required: false
        default: false

# The run files a GitHub issue with the best drafts — issues email automatically,
# which is what actually gets them sent.
permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Find and draft backlink opportunities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Run backlink monitor
        working-directory: scripts/content-engine
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
          # MUST be github.token, NOT GH_PAT. The PAT belongs to the repo owner,
          # so a PAT-authored issue is "your own action" and GitHub will not
          # email you about it — silently defeating the point. The bot authoring
          # it is exactly why the Failure Watchdog's emails arrive.
          GH_TOKEN:           ${{ github.token }}
          GITHUB_OWNER:       farrimond-ma
          GITHUB_REPO:        boxxfinance-site
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node backlink-outreach.js --dry-run
          else
            node backlink-outreach.js
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Backlink Outreach Monitor" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "Monitors Bridging & Commercial, Property Reporter, Mortgage Solutions and more." >> $GITHUB_STEP_SUMMARY
          echo "New opportunities saved to the Backlink_Prospects tab — review and send manually." >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Prospects](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
