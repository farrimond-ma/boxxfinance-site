name: Publish Facebook Reel

on:
  schedule:
    - cron: '9 11 * * *'   # AM run: 11:09 UTC = ~just after noon BST (staggered off :00 to dodge scheduler queueing)
    - cron: '21 16 * * *'   # PM run: 16:21 UTC = ~just after 5pm BST (staggered off :00)

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode — disable service filter to post any recent article (for testing only)'
        type: boolean
        required: false
        default: false

jobs:
  publish-reel:
    name: Generate and post Facebook Reel
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          # libcaca0 noble-updates package has a broken mirror â€” install base noble version directly
          wget -q http://archive.ubuntu.com/ubuntu/pool/main/libc/libcaca/libcaca0_0.99.beta20-4build2_amd64.deb
          sudo dpkg -i libcaca0_0.99.beta20-4build2_amd64.deb
          sudo apt-get install -y ffmpeg

      # Reels previously used DejaVuSans, the generic Linux default, which
      # looked cheap. Outfit is the site's heading font. It ships as a variable
      # font (assets/fonts/Outfit-Variable.ttf); ffmpeg drawtext can't select a
      # named instance, so derive static Bold (700) and SemiBold (600) weights
      # here. If this step ever fails, the script falls back to DejaVu rather
      # than crashing (and logs it loudly).
      - name: Build brand fonts for reels
        run: |
          python3 -m pip install --quiet fonttools
          mkdir -p /tmp/boxx-fonts
          OUTFIT=scripts/content-engine/assets/fonts/Outfit-Variable.ttf
          python3 -m fontTools.varLib.instancer "$OUTFIT" wght=700 -o /tmp/boxx-fonts/Outfit-Bold.ttf
          python3 -m fontTools.varLib.instancer "$OUTFIT" wght=600 -o /tmp/boxx-fonts/Outfit-SemiBold.ttf
          # Playfair Display — the high-contrast serif for the headline and 01/02/03 numerals
          PLAYFAIR=scripts/content-engine/assets/fonts/PlayfairDisplay-Variable.ttf
          python3 -m fontTools.varLib.instancer "$PLAYFAIR" wght=700 -o /tmp/boxx-fonts/PlayfairDisplay-Bold.ttf
          ls -la /tmp/boxx-fonts/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Publish Facebook Reel
        working-directory: scripts/content-engine
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:             ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN:                   ${{ secrets.GH_PAT }}
          GITHUB_OWNER:               farrimond-ma
          GITHUB_REPO:                boxxfinance-site
          SERVICE_FILTER:             ${{ github.event.inputs.test_mode == 'true' && '' || 'Bridging Finance' }}
          FACEBOOK_PAGE_ID:           ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          ELEVENLABS_API_KEY:         ${{ secrets.ELEVENLABS_API_KEY }}
          TIKTOK_ACCESS_TOKEN:        ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:          ${{ secrets.INSTAGRAM_USER_ID }}
          YOUTUBE_CLIENT_ID:          ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:      ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:      ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: node publish-facebook-reels.js

      - name: Post summary
        if: always()
        run: |
          echo "## Facebook Reels Publisher" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "ðŸ“Š [View Queue](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
