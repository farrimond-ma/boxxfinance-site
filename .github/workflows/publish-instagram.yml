name: Publish Instagram Post

on:
  # Instagram image posting replaced by publish-facebook-reels.yml which posts
  # video Reels to both Facebook and Instagram — far better engagement than images.
  # Schedule disabled. This workflow is kept as a manual fallback only.
  # schedule:
  #   - cron: '0  9 * * *'   # AM run:  9:00 UTC  = ~10:00 BST
  #   - cron: '0 15 * * *'   # PM run: 15:00 UTC  = ~4:00 BST

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode — disable service filter to post any recent article (for testing only)'
        type: boolean
        required: false
        default: false

jobs:
  publish-instagram:
    name: Generate and post to Instagram
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Run Instagram publisher
        working-directory: scripts/content-engine
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:                   ${{ secrets.GH_PAT }}
          GITHUB_OWNER:               farrimond-ma
          GITHUB_REPO:                boxxfinance-site
          SERVICE_FILTER:             ${{ github.event.inputs.test_mode == 'true' && '' || 'Bridging Finance' }}
          INSTAGRAM_USER_ID:          ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: node publish-instagram.js

      - name: Post summary
        if: always()
        run: |
          echo "## Instagram Publisher" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "ðŸ“Š [View Queue](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
