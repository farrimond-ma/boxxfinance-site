name: Expand UK Places List

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would be added without writing'
        type: boolean
        required: false
        default: false

jobs:
  expand:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
        working-directory: scripts/content-engine
      - name: Add new towns to UK_Places
        working-directory: scripts/content-engine
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:     ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node expand-uk-places.js --dry-run
          else
            node expand-uk-places.js
          fi
