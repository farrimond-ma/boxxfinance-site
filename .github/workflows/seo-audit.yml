name: SEO Audit

on:
  # Run after the site DEPLOY completes — not after the blog publisher.
  # Auditing straight after the publisher raced the ~8-minute deploy
  # (prerender + FTP) and crawled half-uploaded pages, causing
  # intermittent failures. The job-level guard below limits this to
  # deploys of new content.
  workflow_run:
    workflows: ["Deploy Site"]
    types:
      - completed

  # Weekly full audit — Monday 7:14 AM UTC (8:14 AM BST) — staggered off :00 to dodge scheduler queueing
  schedule:
    - cron: '14 7 * * 1'

  # Manual trigger
  workflow_dispatch:
    inputs:
      crawl_live:
        description: 'Crawl live pages (true/false) — disabled by default as site is SPA (React renders tags client-side, not in raw HTML)'
        required: false
        default: 'false'

jobs:
  seo-audit:
    name: Run SEO audit
    runs-on: ubuntu-latest
    # Chained runs: only after a SUCCESSFUL deploy of new content (blog or
    # location publish commits) — not after every social-flag commit deploy
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && (contains(github.event.workflow_run.head_commit.message, 'Publish blog:') || contains(github.event.workflow_run.head_commit.message, 'Publish location:'))) }}
    timeout-minutes: 15
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: scripts/content-engine
        run: npm install --legacy-peer-deps

      - name: Run SEO audit
        working-directory: scripts/content-engine
        env:
          GITHUB_OWNER:      ${{ github.repository_owner }}
          GITHUB_REPO:       ${{ github.event.repository.name }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          SEO_CRAWL_LIVE:    ${{ github.event.inputs.crawl_live || 'false' }}
        run: node seo-audit.js

      - name: Open GitHub Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `SEO Audit: issues found — ${new Date().toISOString().split('T')[0]}`;
            const body = `The automated SEO audit found errors. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the full report.\n\nFix errors flagged 🔴 first, then warnings 🟡.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seo-audit',
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['seo-audit'],
              });
            }
