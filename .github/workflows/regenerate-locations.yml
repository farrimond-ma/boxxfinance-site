name: Regenerate Location Pages

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Specific slug to regenerate (leave blank for ALL pages)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — log what would change without writing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  regenerate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: scripts/content-engine

      - name: Regenerate location pages
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GITHUB_OWNER: farrimond-ma
          GITHUB_REPO: boxxfinance-site
        run: |
          ARGS=""
          if [ -n "${{ inputs.slug }}" ]; then ARGS="$ARGS --slug ${{ inputs.slug }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node regenerate-locations.js $ARGS
        working-directory: scripts/content-engine
        timeout-minutes: 60
