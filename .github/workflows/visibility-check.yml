name: AI Visibility Check

on:
  schedule:
    - cron: "0 7 * * 1"

  workflow_dispatch:
    inputs:
      priority_filter:
        description: "Prompt priority to run (high / medium / low / all)"
        required: false
        default: "all"
      services:
        description: "Comma-separated services (chatgpt,perplexity,claude,gemini)"
        required: false
        default: "chatgpt,perplexity,claude,gemini"
      dry_run:
        description: "Dry run (no API calls)"
        type: boolean
        required: false
        default: false

jobs:
  visibility-check:
    name: Run visibility check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: visibility-checker
        run: npm install

      - name: Build run flags
        id: flags
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ github.event.inputs.priority_filter }}" = "high" ]; then
            FLAGS="$FLAGS --high-only"
          fi
          SERVICES="${{ github.event.inputs.services }}"
          if [ -n "$SERVICES" ] && [ "$SERVICES" != "chatgpt,perplexity,claude" ]; then
            FLAGS="$FLAGS --services=$SERVICES"
          fi
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run AI visibility checker
        working-directory: visibility-checker
        env:
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID:    ${{ secrets.SPREADSHEET_ID }}
        run: node src/checker.js ${{ steps.flags.outputs.flags }}

      - name: Upload CSV results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visibility-results-${{ github.run_id }}
          path: visibility-checker/results/*.csv
          retention-days: 90

      - name: Post summary
        if: always()
        run: |
          echo "## Boxx Finance AI Visibility Check" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ github.event.inputs.services || 'chatgpt,perplexity,claude' }}" >> $GITHUB_STEP_SUMMARY
          if ls visibility-checker/results/*.csv 1> /dev/null 2>&1; then
            CSV=$(ls visibility-checker/results/*.csv | head -1)
            TOTAL=$(tail -n +2 "$CSV" | wc -l)
            BOXX=$(tail -n +2 "$CSV" | awk -F',' '{print $7}' | grep -c '"YES"' || true)
            echo "**Total queries:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "**Boxx mentioned:** $BOXX / $TOTAL" >> $GITHUB_STEP_SUMMARY
          fi
          echo "📊 [View Google Sheet](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
