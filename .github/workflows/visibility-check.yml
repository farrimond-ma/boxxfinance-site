name: AI Visibility Check

on:
  # Run every Monday at 07:00 UTC
  schedule:
    - cron: "0 7 * * 1"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      priority_filter:
        description: "Prompt priority to run (high / medium / low / all)"
        required: false
        default: "all"
      services:
        description: "Comma-separated services (chatgpt,perplexity,claude)"
        required: false
        default: "chatgpt,perplexity,claude"
      dry_run:
        description: "Dry run (no API calls)"
        type: boolean
        required: false
        default: false

jobs:
  visibility-check:
    name: Run visibility check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build run flags
        id: flags
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          if [ "${{ github.event.inputs.priority_filter }}" = "high" ]; then
            FLAGS="$FLAGS --high-only"
          fi
          SERVICES="${{ github.event.inputs.services }}"
          if [ -n "$SERVICES" ] && [ "$SERVICES" != "chatgpt,perplexity,claude" ]; then
            FLAGS="$FLAGS --services=$SERVICES"
          fi
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT

      - name: Run AI visibility checker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: node src/checker.js ${{ steps.flags.outputs.flags }}

      - name: Upload CSV results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visibility-results-${{ github.run_id }}
          path: results/*.csv
          retention-days: 90

      - name: Post summary to job
        if: always()
        run: |
          echo "## Boxx Finance AI Visibility Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Services:** ${{ github.event.inputs.services || 'chatgpt,perplexity,claude' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls results/*.csv 1> /dev/null 2>&1; then
            CSV=$(ls results/*.csv | head -1)
            TOTAL=$(tail -n +2 "$CSV" | wc -l)
            BOXX=$(tail -n +2 "$CSV" | awk -F',' '{print $7}' | grep -c '"YES"' || true)
            echo "**Total queries:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "**Boxx mentioned:** $BOXX / $TOTAL" >> $GITHUB_STEP_SUMMARY
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(awk "BEGIN {printf \"%.1f\", ($BOXX/$TOTAL)*100}")
              echo "**Visibility score:** $PCT%" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Google Sheet](https://docs.google.com/spreadsheets/d/${{ secrets.SPREADSHEET_ID }})" >> $GITHUB_STEP_SUMMARY
