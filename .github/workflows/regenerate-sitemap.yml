name: Regenerate Sitemap

on:
  # Fires whenever location pages or blog posts change — keeps sitemap always current
  push:
    paths:
      - 'src/data/locationPages.json'
      - 'src/data/blogPosts.json'

  # Manual trigger
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          # Always check out HEAD, not the triggering commit, to get latest data
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Regenerate sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit updated sitemap if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          if git diff --staged --quiet; then
            echo "Sitemap unchanged — nothing to commit"
            exit 0
          fi

          LOCS=$(grep -c '/locations/' public/sitemap.xml || echo 0)
          BLOGS=$(grep -c '/insights/' public/sitemap.xml || echo 0)
          git commit -m "chore: regenerate sitemap (${LOCS} locations, ${BLOGS} blogs)"

          # Multiple publishers can push data files within seconds of each other,
          # which fires several of these runs concurrently. Whoever pushes last wins
          # a non-fast-forward race, so retry with rebase + regeneration instead of
          # failing the run on a benign collision.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Sitemap committed and pushed (attempt ${attempt})"
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}) — rebasing onto latest main and regenerating..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; git reset --hard origin/main; }
            node scripts/generate-sitemap.js
            git add public/sitemap.xml
            if git diff --staged --quiet; then
              echo "Sitemap matches latest main after rebase — nothing left to push"
              exit 0
            fi
            LOCS=$(grep -c '/locations/' public/sitemap.xml || echo 0)
            BLOGS=$(grep -c '/insights/' public/sitemap.xml || echo 0)
            git commit -m "chore: regenerate sitemap (${LOCS} locations, ${BLOGS} blogs)" --amend
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::Failed to push sitemap after 5 attempts"
          exit 1
